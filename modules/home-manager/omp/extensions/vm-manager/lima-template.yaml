vmType: vz
cpus: 4
memory: 8GiB
disk: 50GiB

images:
  - location: "https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-arm64.img"
    arch: aarch64
    digest: "sha256:0cc0a529a52109b52bf697a0d90bdd0f252e7ad91b3a67f70879d56d1f64e240"
  - location: "https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-amd64.img"
    arch: x86_64
    digest: "sha256:7cbfa215a3774c46c6dc29b457f4e9667acda85fc04c7971e1e592b5056e7573"

mounts:
  - location: "~/.omp/agent/vm/nix-store"
    mountPoint: "/nix"
    writable: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail

      # Install mutagen-agent (needed for host<->VM sync)
      MUTAGEN_VERSION="0.18.1"
      ARCH="{{ .Arch }}-linux"
      curl -fSL "https://github.com/mutagen-io/mutagen/releases/download/v${MUTAGEN_VERSION}/mutagen_${MUTAGEN_VERSION}_${ARCH}.tar.gz" \
        -o /tmp/mutagen.tar.gz
      tar -xzf /tmp/mutagen.tar.gz -C /usr/local/bin --wildcards '*/mutagen-agent' --strip-components=1
      chmod +x /usr/local/bin/mutagen-agent
      rm /tmp/mutagen.tar.gz

      # Start mutagen-agent as a background service
      nohup mutagen-agent synchronizer > /var/log/mutagen-agent.log 2>&1 &
      sleep 1
      pgrep mutagen-agent && echo "mutagen-agent started" || echo "mutagen-agent failed to start"

      FLOX_VERSION="1.11.4"
      curl -fSL "https://downloads.flox.dev/by-env/stable/deb/flox-${FLOX_VERSION}.${ARCH}.deb" \
        -o /tmp/flox.deb
      dpkg -i /tmp/flox.deb
      rm /tmp/flox.deb
      # Install Docker
      apt-get update -qq
      apt-get install -y docker.io
      systemctl enable docker
      systemctl start docker
      usermod -aG docker {{ .User }}

ssh:
  localForward: []